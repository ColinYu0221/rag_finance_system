services:
  # ── 基础设施 ──

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rag-finance-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command: >-
      etcd
      -advertise-client-urls=http://etcd:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - milvus-etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: rag-finance-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9001:9001"
    volumes:
      - milvus-minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    image: docker.m.daocloud.io/milvusdb/milvus:v2.5.10
    container_name: rag-finance-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-standalone:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  neo4j:
    image: docker.m.daocloud.io/neo4j:5-community
    container_name: rag-finance-neo4j
    environment:
      NEO4J_AUTH: neo4j/rag123456
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "17687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "neo4j", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: rag-finance-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rag123456
      MYSQL_DATABASE: rag_finance
      MYSQL_USER: rag_user
      MYSQL_PASSWORD: rag123456
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 应用服务 ──

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-finance-api
    container_name: rag-finance-api
    ports:
      - "8000:8000"
    env_file:
      - rag_finance_system/.env.docker
    volumes:
      - ./rag_finance_system/.env.docker:/app/rag_finance_system/.env
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_started
    restart: unless-stopped

  frontend:
    image: rag-finance-api
    container_name: rag-finance-frontend
    ports:
      - "8501:8501"
    environment:
      - RAG_API_URL=http://api:8000
    volumes:
      - ./rag_finance_system/.env.docker:/app/rag_finance_system/.env
    depends_on:
      - api
    restart: unless-stopped

volumes:
  milvus-etcd:
  milvus-minio:
  milvus-standalone:
  neo4j-data:
  neo4j-logs:
  mysql-data:
